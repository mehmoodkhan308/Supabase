<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.container{
    width:800px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.left,
.right{
    width:50%;
    padding:50px;
}

.left{
    background:#4f46e5;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.left h1{
    margin-bottom:15px;
}

.left p{
    line-height:1.6;
}

.right h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#4338ca;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    color:#4f46e5;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Welcome Back!</h1>
        <p>
            Login to access your account and continue your journey.
        </p>
    </div>

    <div class="right">
        <h2>Create Account</h2>

      
            <div class="input-group">
                <input id="fullName"  type="text" placeholder="Full Name">
            </div>

            <div class="input-group">
                <input id="email" type="email" placeholder="Email">
            </div>

            <div class="input-group">
                <input id="password" type="password" placeholder="Password">
            </div>
            <div class="input-group">
                <input id="phoneNumber" type="text" placeholder="PhoneNumber">
            </div>

            <button type="submit" onclick="signupHalder()">Sign Up</button>

            <div class="link">
                Already have an account?
                <a href="./login.html">Login</a>
            </div>
     
    </div>

</div>


</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../app.js"></script>

</html>
